    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png" />
    <!-- SEO / OG -->
    <meta name="description" content="The authority on African political intelligence. Real-time PESTEL signals, election tracking, stability scores, and AI-powered briefs across all 55 African nations." />
    <meta property="og:title" content="ViralBeat — Africa's Political Intelligence Layer" />
    <meta property="og:description" content="Join the African intelligence network. Real-time PESTEL signals, election tracking, and AI-powered country briefs across all 55 nations. Built for journalists, NGOs, researchers, and risk analysts." />

    <meta property="og:url" content="https://viralbeat.io" />
    <meta property="og:site_name" content="ViralBeat" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ViralBeat — Africa's Political Intelligence Layer" />
    <meta name="twitter:description" content="The authority on African political intelligence. Real-time signals, election tracking, and AI-powered briefs across all 55 nations." />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register service worker for PWA support (production only)
      // In development, the SW interferes with Vite's dev server and HMR
      if ('serviceWorker' in navigator && location.hostname !== 'localhost' && !location.hostname.includes('manus.computer')) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(reg => console.log('[PWA] Service worker registered:', reg.scope))
            .catch(err => console.warn('[PWA] Service worker registration failed:', err));
        });
      } else if ('serviceWorker' in navigator) {
        // Unregister any previously registered service workers in dev mode
        navigator.serviceWorker.getRegistrations().then(registrations => {
          for (const reg of registrations) {
            reg.unregister().then(() => console.log('[PWA] Dev mode: unregistered SW to prevent caching issues'));
          }
        });
        // Clear all SW caches in dev mode
        if ('caches' in window) {
          caches.keys().then(keys => keys.forEach(key => caches.delete(key)));
        }
      }
    </script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
